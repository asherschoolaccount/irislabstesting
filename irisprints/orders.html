<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" href="../assets/logo.png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iris Prints — Place an Order</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <nav class="navbar">
    <a href="../" class="navbar-brand" style="opacity:0.7;font-size:0.8rem;margin-right:12px;">Iris Labs</a><a href="index.html" class="navbar-brand">Iris<span>Prints</span></a>
    <div class="navbar-links">
      <a href="index.html">Home</a>
      <a href="products.html">Products</a>
      <a href="orders.html">Order</a>
      <a href="employees.html">Team</a>
      <a href="terms.html">Terms</a>
      <a href="privacy.html">Privacy</a>
    </div>
  </nav>

  <div class="order-wrap">
    <div class="form-card">
      <h2>Place an Order</h2>
      <p class="subtitle">Fill out the form below and we'll get back to you.</p>

      <form action="https://formspree.io/f/xpqovwpe" method="POST">
        <input type="hidden" name="_subject" value="New Iris Prints Order">

        <div class="form-group">
          <label for="name">Your Name</label>
          <input type="text" id="name" name="name" placeholder="e.g. Alex Smith" required>
        </div>

        <div class="form-group">
          <label for="item">Item to Print</label>
          <input type="text" id="item" name="item" placeholder="Describe what you'd like" required>
        </div>

        <div class="form-group">
          <label for="color">Color Preference</label>
          <input type="text" id="color" name="color" placeholder="e.g. Blue, Red, any colour">
        </div>

        <div class="form-group">
          <label for="notes">Notes or Custom Requests</label>
          <textarea id="notes" name="notes" placeholder="Any special instructions, dimensions, etc."></textarea>
        </div>

        <div class="checkbox-row">
          <input type="checkbox" id="agree" required>
          <label for="agree">
            I agree to the <a href="terms.html">Terms &amp; Conditions</a> and <a href="privacy.html">Privacy Policy</a>
          </label>
        </div>

        <button type="submit" class="btn-submit">Send Order</button>
      </form>
    </div>
  </div>

  <footer>
    &copy; 2026 Iris Prints &mdash; an <a href="#">Iris Labs</a> company
  </footer>

</body>
</html>
